openapi: 3.0.3
info:
  title: OpenAPI Demo API
  version: 1.0.0
  description: Demo API for code generation

servers:
  - url: https://api.example.com
    description: API server

paths:
  /items:
    get:
      operationId: getItems
      tags:
        - items
      summary: List items
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
    post:
      operationId: createItem
      tags:
        - items
      summary: Create item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
  /items/{id}:
    get:
      operationId: getItemById
      tags:
        - items
      summary: Get item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Not found

  /pets:
    get:
      operationId: getPets
      tags:
        - pets
      summary: List pets
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      tags:
        - pets
      summary: Save pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'

  /shapes:
    get:
      operationId: getShapes
      tags:
        - shapes
      summary: List shapes
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shape'
    post:
      operationId: createShape
      tags:
        - shapes
      summary: Save shape
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shape'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shape'

  /vehicles:
    get:
      operationId: getVehicles
      tags:
        - vehicles
      summary: List vehicles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
    post:
      operationId: createVehicle
      tags:
        - vehicles
      summary: Save vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Vehicle'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'

  /fruits:
    get:
      operationId: getFruits
      tags:
        - fruits
      summary: List fruits
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fruit'
    post:
      operationId: createFruit
      tags:
        - fruits
      summary: Save fruit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Fruit'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fruit'

components:
  schemas:
    Item:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "Demo Item"
    ItemCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "New Item"

    Pet:
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
      discriminator:
        propertyName: type
        mapping:
          cat: '#/components/schemas/Cat'
          dog: '#/components/schemas/Dog'
      properties:
        type:
          $ref: '#/components/schemas/PetType'


    PetType:
      type: string
      enum:
        - cat
        - dog

    Cat:
      type: object
      required:
        - type
        - name
      properties:
        type:
          $ref: '#/components/schemas/PetType'
        name:
          type: string
          example: "Murzik"
        whiskersLength:
          type: number
          format: float
          description: Whisker length in cm
          example: 5.2
        indoor:
          type: boolean
          description: Indoor cat
          example: true

    Dog:
      type: object
      required:
        - type
        - name
      properties:
        type:
          $ref: '#/components/schemas/PetType'
        name:
          type: string
          example: "Sharik"
        breed:
          type: string
          description: Breed
          example: "Labrador"
        barkVolume:
          type: string
          enum:
            - quiet
            - medium
            - loud
          description: Bark volume
          example: "medium"

    Shape:
      type: object
      required:
        - type
        - data
      oneOf:
        - $ref: '#/components/schemas/CircleWrapper'
        - $ref: '#/components/schemas/SquareWrapper'
      discriminator:
        propertyName: type
        mapping:
          circle: '#/components/schemas/CircleWrapper'
          square: '#/components/schemas/SquareWrapper'
      properties:
        type:
          $ref: '#/components/schemas/ShapeType'

    ShapeType:
      type: string
      enum:
        - circle
        - square

    CircleWrapper:
      type: object
      required:
        - type
        - data
      properties:
        type:
          $ref: '#/components/schemas/ShapeType'
        data:
          $ref: '#/components/schemas/Circle'

    SquareWrapper:
      type: object
      required:
        - type
        - data
      properties:
        type:
          $ref: '#/components/schemas/ShapeType'
        data:
          $ref: '#/components/schemas/Square'

    Circle:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Sun"
        radius:
          type: number
          format: float
          description: Radius
          example: 1.5

    Square:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Window"
        side:
          type: number
          format: float
          description: Side length
          example: 2.0

    Vehicle:
      type: object
      required:
        - type
      oneOf:
        - $ref: '#/components/schemas/CarWrapper'
        - $ref: '#/components/schemas/BikeWrapper'
      discriminator:
        propertyName: type
        mapping:
          car: '#/components/schemas/CarWrapper'
          bike: '#/components/schemas/BikeWrapper'
      properties:
        type:
          $ref: '#/components/schemas/VehicleType'

    VehicleType:
      type: string
      enum:
        - car
        - bike

    CarWrapper:
      type: object
      required:
        - type
        - car
      properties:
        type:
          $ref: '#/components/schemas/VehicleType'
        car:
          $ref: '#/components/schemas/Car'

    BikeWrapper:
      type: object
      required:
        - type
        - bike
      properties:
        type:
          $ref: '#/components/schemas/VehicleType'
        bike:
          $ref: '#/components/schemas/Bike'

    Car:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Toyota Camry"
        brand:
          type: string
          example: "Toyota"
        horsepower:
          type: integer
          description: Horsepower
          example: 181

    Bike:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Mountain Pro"
        gears:
          type: integer
          description: Number of gears
          example: 21
        electric:
          type: boolean
          description: Electric bike
          example: false

    FruitType:
      type: string
      enum:
        - apple
        - banana
      description: Fruit kind

    Fruit:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/FruitType'
        apple:
          $ref: '#/components/schemas/Apple'
        banana:
          $ref: '#/components/schemas/Banana'

    Apple:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Granny Smith"
        color:
          type: string
          example: "green"
        weightGrams:
          type: integer
          description: Weight in grams
          example: 180

    Banana:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Cavendish"
        lengthCm:
          type: number
          format: float
          description: Length in cm
          example: 18.5
        ripe:
          type: boolean
          description: Is ripe
          example: true
