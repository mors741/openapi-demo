openapi: 3.0.3
info:
  title: OpenAPI Demo API
  version: 1.0.0
  description: Demo API for code generation

paths:
  /items:
    get:
      operationId: getItems
      tags:
        - items
      summary: List items
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
    post:
      operationId: createItem
      tags:
        - items
      summary: Create item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
  /items/{id}:
    get:
      operationId: getItemById
      tags:
        - items
      summary: Get item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Not found

  /pets:
    get:
      operationId: getPets
      tags:
        - pets
      summary: List pets
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      tags:
        - pets
      summary: Save pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'

  /shapes:
    get:
      operationId: getShapes
      tags:
        - shapes
      summary: List shapes
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShapeWrapper'
    post:
      operationId: createShape
      tags:
        - shapes
      summary: Save shape
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShapeWrapper'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShapeWrapper'

components:
  schemas:
    Item:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "Demo Item"
    ItemCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "New Item"

    Pet:
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
      discriminator:
        propertyName: type
        mapping:
          cat: '#/components/schemas/Cat'
          dog: '#/components/schemas/Dog'

    Cat:
      type: object
      required:
        - type
        - name
      properties:
        type:
          type: string
          example: "cat"
          description: Always "cat" for a cat
        name:
          type: string
          example: "Murzik"
        whiskersLength:
          type: number
          format: float
          description: Whisker length in cm
          example: 5.2
        indoor:
          type: boolean
          description: Indoor cat
          example: true

    Dog:
      type: object
      required:
        - type
        - name
      properties:
        type:
          type: string
          example: "dog"
          description: Always "dog" for a dog
        name:
          type: string
          example: "Sharik"
        breed:
          type: string
          description: Breed
          example: "Labrador"
        barkVolume:
          type: string
          enum:
            - quiet
            - medium
            - loud
          description: Bark volume
          example: "medium"

    ShapeWrapper:
      type: object
      required:
        - type
        - data
      properties:
        type:
          type: string
          enum:
            - circle
            - square
          description: Shape type
        data:
          oneOf:
            - $ref: '#/components/schemas/Circle'
            - $ref: '#/components/schemas/Square'
          description: Shape data (circle or square depending on type)

    Circle:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Sun"
        radius:
          type: number
          format: float
          description: Radius
          example: 1.5

    Square:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Window"
        side:
          type: number
          format: float
          description: Side length
          example: 2.0
